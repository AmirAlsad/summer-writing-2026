<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Type — Editorial Serif</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:28px 32px;}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:10px;}
  .h3{font-family:var(--font-editorial);font-weight:400;font-size:40px;line-height:1.1;color:var(--ink);}
  .h3 em{font-style:italic;color:var(--hot-pink);}
  .lede{font-family:var(--font-editorial);font-weight:400;font-style:italic;font-size:22px;line-height:1.3;color:var(--ink-soft);margin-top:10px;}
</style></head>
<body>
<div class="wrap">
  <div class="meta">DM SERIF DISPLAY · REGULAR + ITALIC</div>
  <div class="h3">What if a blog could feel like <em>a paperback?</em></div>
  <div class="lede">Used for editorial subheads, pull quotes, and rhetorical asides.</div>
</div>
</body></html>
