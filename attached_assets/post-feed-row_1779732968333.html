<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Post Feed Row</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:0 32px;}
  .row{
    display:grid;grid-template-columns:96px 1fr auto;gap:24px;align-items:start;
    padding:24px 0;border-top:1.5px solid var(--ink);
    cursor:pointer;
    transition: padding-left 200ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .row:last-child{border-bottom:1.5px solid var(--ink);}
  .day{
    display:inline-block;
    font-family:var(--font-display);font-weight:900;font-size:54px;line-height:0.9;
    color:var(--ink);letter-spacing:-2px;
    transition: color 200ms cubic-bezier(0.2,0.8,0.2,1),
                transform 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .day small{display:block;font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--ink-mute);text-transform:uppercase;margin-top:4px;}
  .title{font-family:var(--font-display);font-weight:800;font-size:30px;line-height:1;letter-spacing:-0.5px;color:var(--ink);margin:0 0 6px;
    transition: color 200ms cubic-bezier(0.2,0.8,0.2,1);
  }
  .desc{font-family:var(--font-serif);font-style:italic;font-size:16px;line-height:1.5;color:var(--ink-soft);margin:0;max-width:520px;}
  .meta{font-family:var(--font-mono);font-size:11px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-mute);white-space:nowrap;padding-top:8px;display:flex;align-items:center;gap:10px;}
  .arrow{
    display:inline-block;width:0;overflow:hidden;
    font-family:var(--font-display);font-weight:900;font-size:22px;color:var(--hot-pink);
    transition: width 200ms cubic-bezier(0.2,0.8,0.2,1), margin-left 200ms cubic-bezier(0.2,0.8,0.2,1);
    margin-left:0;
  }

  /* hover: day number flips to hot pink + bumps up-left,
     title color shifts to hot pink, an arrow slides in,
     entire row shifts 6px right to feel "turned toward you" */
  .row:hover{padding-left:6px;}
  .row:hover .day{color:var(--hot-pink);transform:translate(-2px,-2px);}
  .row:hover .title{color:var(--hot-pink);}
  .row:hover .arrow{width:24px;margin-left:4px;}
</style></head>
<body>
<div class="wrap">
  <div class="row">
    <div class="day">14<small>06.14</small></div>
    <div>
      <h3 class="title">The argument I keep losing</h3>
      <p class="desc">Why I can't stop rereading the same forty pages of <em>Stoner</em>.</p>
    </div>
    <div class="meta">
      7 MIN · ESSAYS
      <span class="arrow">→</span>
    </div>
  </div>
  <div class="row" style="padding-left:6px;">
    <div class="day" style="color:var(--hot-pink);transform:translate(-2px,-2px);">13<small>06.13</small></div>
    <div>
      <h3 class="title" style="color:var(--hot-pink);">Notes from a porch in Naples</h3>
      <p class="desc">A short field-note about humidity, lemons, and old men playing scopa.</p>
    </div>
    <div class="meta">
      4 MIN · NOTES
      <span class="arrow" style="width:24px;margin-left:4px;">→</span>
    </div>
  </div>
</div>
</body></html>
