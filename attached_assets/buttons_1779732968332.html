<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:32px;display:flex;gap:18px;align-items:center;flex-wrap:wrap;}
  .btn{
    font-family:var(--font-display);font-weight:800;font-size:16px;
    letter-spacing:0.02em;text-transform:uppercase;
    padding:14px 24px;border:3px solid var(--ink);background:var(--paper);
    color:var(--ink);cursor:pointer;box-shadow:5px 5px 0 var(--ink);
    transition:transform var(--dur) var(--ease-out), box-shadow var(--dur) var(--ease-out);
  }
  .btn:hover{transform:translate(-2px,-2px);box-shadow:8px 8px 0 var(--ink);}
  .btn.primary{background:var(--hot-pink);color:var(--paper);}
  .btn.secondary{background:var(--turquoise);}
  .btn.ghost{background:transparent;}
  /* hexagonal / pointed pill (Greptile-style) */
  .btn.hex{
    clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%);
    padding:14px 30px;border:none;box-shadow:none;
    position:relative;
  }
  .hex-wrap{position:relative;display:inline-block;}
  .hex-wrap::before{
    content:"";position:absolute;inset:0;background:var(--ink);
    clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%);
    transform:translate(4px,4px);z-index:0;
  }
  .hex-wrap .btn.hex{position:relative;z-index:1;}
</style></head>
<body>
<div class="wrap">
  <button class="btn primary">START READING</button>
  <button class="btn secondary">SUBSCRIBE</button>
  <button class="btn">RSS FEED</button>
  <span class="hex-wrap"><button class="btn hex primary">DAY 14 →</button></span>
</div>
</body></html>
