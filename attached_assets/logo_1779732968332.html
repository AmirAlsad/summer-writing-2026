<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Logo — Summer Writing '26</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:40px 32px;}
  .word{display:flex;flex-direction:column;line-height:0.88;}
  .word .l1{font-family:var(--font-display);font-weight:900;font-size:64px;color:var(--ink);letter-spacing:-2px;white-space:nowrap;}
  .word .l2{font-family:var(--font-display);font-weight:900;font-size:64px;color:var(--ink);letter-spacing:-2px;white-space:nowrap;}
  .word .l2 em{color:var(--hot-pink);font-style:normal;}
</style></head>
<body>
<div class="card">
  <div class="word">
    <div class="l1">SUMMER</div>
    <div class="l2">WRITING <em>'26</em></div>
  </div>
</div>
</body></html>
