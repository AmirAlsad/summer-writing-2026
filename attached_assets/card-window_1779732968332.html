<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Window-Chrome Card</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:24px 32px;}
  .card{
    border:3px solid var(--ink);border-radius:6px;background:#fff;
    box-shadow:6px 6px 0 var(--ink);overflow:hidden;
  }
  .bar{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:8px 12px;border-bottom:3px solid var(--ink);background:var(--paper-2);
  }
  .tab{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--font-mono);font-weight:700;font-size:12px;
    letter-spacing:0.08em;text-transform:uppercase;color:var(--ink);
    padding:4px 10px;background:var(--hot-pink);color:var(--paper);
  }
  .tab .sq{width:9px;height:9px;background:var(--paper);}
  .bar .lines{flex:1;height:6px;background:repeating-linear-gradient(to right, var(--ink) 0 18px, transparent 18px 24px);max-width:140px;}
  .body{padding:18px 18px 22px;}
  .body h4{font-family:var(--font-editorial);font-weight:400;font-size:24px;line-height:1.15;margin:0 0 8px;color:var(--ink);}
  .body p{font-family:var(--font-serif);font-size:15px;line-height:1.55;color:var(--ink-soft);margin:0;}
</style></head>
<body>
<div class="wrap">
  <div class="card">
    <div class="bar">
      <span class="tab"><span class="sq"></span>DAY 14 · LIVE</span>
      <div class="lines"></div>
    </div>
    <div class="body">
      <h4>The argument I keep losing</h4>
      <p>A short essay on rereading, attention, and the books we use as anchors against the week.</p>
    </div>
  </div>
</div>
</body></html>
