<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:28px 32px;}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px;}
  .poster{font-family:var(--font-display);font-weight:900;font-size:96px;line-height:0.84;letter-spacing:-0.025em;color:var(--ink);}
  .poster em{color:var(--hot-pink);font-style:normal;}
  .row{display:flex;gap:32px;align-items:flex-end;margin-top:18px;}
  .s{font-family:var(--font-display);color:var(--ink);line-height:0.9;}
  .s1{font-weight:900;font-size:42px;letter-spacing:-1px;}
  .s2{font-weight:800;font-size:30px;letter-spacing:-0.5px;}
  .s3{font-weight:800;font-size:20px;letter-spacing:0;text-transform:uppercase;}
</style></head>
<body>
<div class="wrap">
  <div class="meta">BIG SHOULDERS DISPLAY · 900 / 800</div>
  <div class="poster">THIRTY<br/>PIECES<em>.</em></div>
  <div class="row">
    <span class="s s1">H1 / 88</span>
    <span class="s s2">H2 / 56</span>
    <span class="s s3">H4 / 22 UPPER</span>
  </div>
</div>
</body></html>
