<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Imagery treatment</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:24px 32px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .frame{
    border:3px solid var(--ink);background:#fff;box-shadow:5px 5px 0 var(--ink);
    aspect-ratio:4/3;overflow:hidden;position:relative;
  }
  .frame img{width:100%;height:100%;object-fit:cover;display:block;}
  .frame.halftone img{filter:grayscale(1) contrast(1.4) brightness(1.05);mix-blend-mode:multiply;}
  .frame.halftone{background:var(--hot-pink);}
  .frame.turq{background:var(--turquoise);}
  .frame.turq img{filter:grayscale(1) contrast(1.3);mix-blend-mode:multiply;}
  .frame .tag{position:absolute;top:8px;left:8px;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.08em;color:var(--paper);background:var(--ink);padding:4px 8px;text-transform:uppercase;}
</style></head>
<body>
<div class="wrap">
  <div class="frame"><img src="../assets/vice-city-skyline.png" alt=""/><span class="tag">FULL COLOR</span></div>
  <div class="frame halftone"><img src="../assets/vice-city-yacht.png" alt=""/><span class="tag">HALFTONE · PINK</span></div>
  <div class="frame turq"><img src="../assets/vice-city-shack.png" alt=""/><span class="tag">HALFTONE · TURQ</span></div>
</div>
</body></html>
