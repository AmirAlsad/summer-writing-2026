<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Type — Mono / Metadata</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:28px 32px;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px;}
  .row{display:flex;gap:16px;align-items:center;margin-bottom:14px;font-family:var(--font-mono);}
  .meta{font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink);font-weight:500;}
  .chip{padding:6px 10px;border:2px solid var(--ink);background:var(--paper);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;}
  .chip.pink{background:var(--hot-pink);color:var(--paper);}
  .chip.sun{background:var(--sun);}
  .chip.turq{background:var(--turquoise);}
</style></head>
<body>
<div class="wrap">
  <div class="lbl">JETBRAINS MONO · 500 / 700</div>
  <div class="row">
    <span class="meta">DAY 14 · 06.14.26 · 7 MIN READ</span>
  </div>
  <div class="row">
    <span class="chip pink">DAY 14</span>
    <span class="chip sun">LIVE</span>
    <span class="chip turq">ESSAYS</span>
    <span class="chip">06.14.26</span>
  </div>
</div>
</body></html>
