<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Prev / Next nav</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:30px 32px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .nav{
    display:flex;flex-direction:column;gap:6px;
    border:3px solid var(--ink);background:var(--paper);padding:14px 16px;
    box-shadow:5px 5px 0 var(--ink);text-decoration:none;color:var(--ink);
  }
  .nav.next{text-align:right;}
  .nav .dir{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-mute);}
  .nav .ttl{font-family:var(--font-display);font-weight:800;font-size:22px;line-height:1.05;color:var(--ink);}
</style></head>
<body>
<div class="wrap">
  <a class="nav prev" href="#">
    <span class="dir">← DAY 13</span>
    <span class="ttl">The porch in Naples</span>
  </a>
  <a class="nav next" href="#">
    <span class="dir">DAY 15 →</span>
    <span class="ttl">On giving up on a novel</span>
  </a>
</div>
</body></html>
