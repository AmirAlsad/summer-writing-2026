<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Colors — Paper & Ink</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:24px;}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .sw{
    aspect-ratio:1;border:3px solid var(--ink);
    box-shadow:3px 3px 0 var(--ink);
    display:flex;flex-direction:column;justify-content:flex-end;
    padding:10px;
  }
  .sw .name{font-family:var(--font-display);font-weight:900;font-size:15px;line-height:1;color:var(--ink);}
  .sw .hex{font-family:var(--font-mono);font-size:11px;color:var(--ink);letter-spacing:0.05em;margin-top:4px;}
  .sw.dark .name,.sw.dark .hex{color:var(--paper);}
</style></head>
<body>
<div class="wrap">
  <div class="row">
    <div class="sw" style="background:#F5EFE3"><span class="name">PAPER</span><span class="hex">#F5EFE3</span></div>
    <div class="sw" style="background:#ECE3D0"><span class="name">PAPER 2</span><span class="hex">#ECE3D0</span></div>
    <div class="sw" style="background:#DCD0B8"><span class="name">PAPER 3</span><span class="hex">#DCD0B8</span></div>
    <div class="sw dark" style="background:#3A3F5E"><span class="name">INK SOFT</span><span class="hex">#3A3F5E</span></div>
    <div class="sw dark" style="background:#1B1F3A"><span class="name">INK</span><span class="hex">#1B1F3A</span></div>
  </div>
</div>
</body></html>
