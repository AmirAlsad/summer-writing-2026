<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Chips & Topics</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:28px 32px;display:flex;flex-wrap:wrap;gap:10px 12px;align-items:center;}
  .chip{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--font-mono);font-weight:700;font-size:12px;
    letter-spacing:0.08em;text-transform:uppercase;
    padding:8px 14px;border:2.5px solid var(--ink);border-radius:999px;
    background:var(--paper);color:var(--ink);
    box-shadow:3px 3px 0 var(--ink);
  }
  .chip .dot{width:8px;height:8px;background:var(--ink);}
  .chip.pink{background:var(--hot-pink);color:var(--paper);}
  .chip.pink .dot{background:var(--paper);}
  .chip.turq{background:var(--turquoise);}
  .chip.coral{background:var(--coral);}
  .chip.sun{background:var(--sun);}
  .chip.mint{background:var(--mint);}
  .chip.live .dot{background:#10A674;box-shadow:0 0 0 3px var(--mint);}
</style></head>
<body>
<div class="wrap">
  <span class="chip pink"><span class="dot"></span>ESSAYS</span>
  <span class="chip turq"><span class="dot"></span>FICTION</span>
  <span class="chip coral"><span class="dot"></span>NOTES</span>
  <span class="chip sun"><span class="dot"></span>MARGINALIA</span>
  <span class="chip mint live"><span class="dot"></span>LIVE TODAY</span>
  <span class="chip"><span class="dot"></span>EPHEMERA</span>
</div>
</body></html>
