<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:24px 32px;}
  .lbl{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:repeat(9,1fr);gap:14px;text-align:center;}
  .ic{
    border:2.5px solid var(--ink);background:var(--paper);
    aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
    padding:8px;box-shadow:3px 3px 0 var(--ink);
  }
  .ic svg{width:24px;height:24px;stroke:var(--ink);stroke-width:2.25;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .ic span{font-family:var(--font-mono);font-size:9px;letter-spacing:0.05em;text-transform:uppercase;color:var(--ink);}
</style></head>
<body>
<div class="wrap">
  <div class="lbl">LUCIDE · STROKE 2.25 · approved set</div>
  <div class="grid">
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg><span>arrow-l</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg><span>arrow-r</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2zM22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg><span>book-open</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 19l7-7 3 3-7 7-3-3zM18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5zM2 2l7.586 7.586M11 11a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/></svg><span>pen-tool</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>calendar</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span>clock</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M4 11a9 9 0 0 1 9 9M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/></svg><span>rss</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg><span>chev-d</span></div>
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M10 14L21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg><span>ext-link</span></div>
  </div>
</div>
</body></html>
