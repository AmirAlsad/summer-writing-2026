<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/>
<title>Type — Body Serif</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .wrap{padding:24px 32px;display:flex;gap:32px;align-items:flex-start;}
  .left{flex:1;}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:8px;}
  .body{font-family:var(--font-serif);font-weight:400;font-size:18px;line-height:1.6;color:var(--ink);max-width:520px;text-wrap:pretty;}
  .body em{font-style:italic;}
  .body strong{font-weight:700;}
  .sample{font-family:var(--font-serif);font-size:13px;color:var(--ink-mute);margin-top:10px;font-style:italic;}
</style></head>
<body>
<div class="wrap">
  <div class="left">
    <div class="meta">SOURCE SERIF 4 · 18PX / 1.6</div>
    <div class="body">
      I spent the week trying to figure out why I kept rereading the same forty pages of <em>Stoner</em>. They aren't the dramatic pages. They aren't the ones people quote.
    </div>
    <div class="sample">— Reading column body, 680px max-width</div>
  </div>
</div>
</body></html>
