kind = "web"
previewPath = "/"
title = "Summer Writing '26"
version = "1.0.0"
id = "artifacts/summer-2026"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24781

[services.development]
run = "pnpm --filter @workspace/summer-2026 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/summer-2026", "run", "build" ]
publicDir = "artifacts/summer-2026/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24781"
BASE_PATH = "/"
